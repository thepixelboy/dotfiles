[git_status]
format = '([$ahead_behind]($style) )([$all_status]($style) )'
style = "fg:git"
stashed = "*${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
up_to_date = ""
diverged = "Ôçí${ahead_count}Ôçú${behind_count}"
